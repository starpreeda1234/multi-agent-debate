version: '3.8'

services:
  backend-engine:
    build: ./backend
    container_name: debate-backend-engine
    ports:
      - "7860:7860"
    volumes:
      - ./downloads:/app/downloads
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
    restart: unless-stopped

  frontend-node:
    build: ./frontend-node
    container_name: debate-node-controller
    ports:
      - "3001:3000"  # ออกพอร์ต 3001 ตามที่เปิดใน Alibaba Cloud
    environment:
      - DOCKER_ENGINE_URL=http://backend-engine:7860
    depends_on:
      - backend-engine
    restart: unless-stopped